name: Daily Market Report

on:
  schedule:
    - cron: '30 11 * * 1-5'  # 5:00 PM IST — Asian/Indian markets
    - cron: '30 18 * * 1-5'   # 12:00 AM IST — US/EU markets
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch market data
        run: python scripts/fetch_markets.py

      - name: Commit and push data
        run: |
          git config user.email "bot@theclosereport.com"
          git config user.name "TheCloseReport Bot"
          git add .
          git diff --staged --quiet || git commit -m "Daily market data $(date +%Y-%m-%d)"
          git push

      - name: Send newsletter
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_SUBSCRIBERS: ${{ secrets.NEWSLETTER_SUBSCRIBERS }}
        run: python scripts/send_newsletter.py

      - name: Generate WhatsApp report
        run: python scripts/whatsapp_report.py

      - name: Commit WhatsApp report
        run: |
          git config user.email "bot@theclosereport.com"
          git config user.name "TheCloseReport Bot"
          git add whatsapp_report.txt
          git diff --staged --quiet || git commit -m "WhatsApp report $(date +%Y-%m-%d)"
          git push

