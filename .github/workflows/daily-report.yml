name: Daily Market Report

on:
  schedule:
    - cron: '30 10 * * 1-5'  # 4:00 PM IST / 10:30 AM UTC Mon-Fri
  workflow_dispatch:           # Manual trigger anytime

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch market data
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: python scripts/fetch_markets.py

      - name: Commit and push data
        run: |
          git config user.email "bot@theclosereport.com"
          git config user.name "TheCloseReport Bot"
          git add .
          git diff --staged --quiet || git commit -m "Daily market data $(date +%Y-%m-%d)"
          git push